<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Predicación">
    <link rel="manifest" href="manifest.json">
    <title>Predicación 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        :root {
            --ios-bg: #000000;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: #FFFFFF;
            -webkit-tap-highlight-color: transparent;
            max-width: 430px; 
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overscroll-behavior-y: none;
        }

        .ios-blur {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        select {
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23A1A1AA' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 4px center;
            background-size: 8px;
        }

        .select-no-arrow {
            background-image: none !important;
            text-align: center;
            text-align-last: center;
        }

        /* Estilos Modo Captura */
        .screenshot-mode header, .screenshot-mode nav, .screenshot-mode #btnCloud { display: none !important; }
        .screenshot-mode { background-color: #000000 !important; }
        .screenshot-mode #scheduleContainer { 
            padding-top: calc(env(safe-area-inset-top, 20px) + 40px) !important; 
        }
        
        #btnVolverCaptura {
            top: calc(env(safe-area-inset-top, 20px) + 12px) !important;
            right: 16px !important;
        }
        .screenshot-mode #btnVolverCaptura { display: flex !important; }

        /* Animaciones Premium iOS */
        @keyframes enterRight {
            from { opacity: 0; transform: translateX(30px) scale(0.98); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes enterLeft {
            from { opacity: 0; transform: translateX(-30px) scale(0.98); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes fadeInPremium {
            from { opacity: 0; filter: blur(4px); }
            to { opacity: 1; filter: blur(0); }
        }
        
        .animate-enter-right { animation: enterRight 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-enter-left { animation: enterLeft 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-fade { animation: fadeInPremium 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        .holding {
            transform: scale(0.97);
            transition: all 0.2s ease;
            filter: brightness(1.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-x-hidden" id="appBody">

    <!-- Botón Salir Captura -->
    <button type="button" id="btnVolverCaptura" onclick="exitScreenshotMode()" class="hidden fixed z-50 w-9 h-9 bg-zinc-800/60 backdrop-blur-md text-white/70 rounded-full shadow-md border border-zinc-700/50 items-center justify-center active:scale-95 transition-all">
        <i data-lucide="x" class="w-4 h-4"></i>
    </button>

    <!-- Header Principal -->
    <header class="sticky top-0 z-40 ios-blur px-3 pt-6 pb-2 flex flex-col border-b border-zinc-900">
        <div class="relative w-full flex items-center justify-center mb-4">
            <h1 class="text-[24px] font-extrabold tracking-tight text-white text-center">Predicación</h1>
            <button type="button" id="btnCloud" onclick="syncCloudPlaceholder()" class="absolute right-0 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center bg-zinc-800/80 rounded-full text-white/80 active:scale-95 transition-transform">
                <i data-lucide="cloud" class="w-4 h-4"></i>
            </button>
        </div>
        
        <div class="flex items-center justify-between w-full pb-2">
            <div class="flex items-center gap-1 overflow-x-auto no-scrollbar">
                <button type="button" id="btnCampana" onclick="toggleCampana()" class="h-7 px-2 flex items-center justify-center bg-zinc-800 rounded-full text-white/80 active:scale-95 transition-transform shrink-0"><span class="font-bold text-[11px]">CAM</span></button>
                <button type="button" id="btnVisita" onclick="toggleVisita()" class="h-7 px-2 flex items-center justify-center bg-zinc-800 rounded-full text-white/80 active:scale-95 transition-transform shrink-0"><span class="font-bold text-[11px]">VIS</span></button>
                <button type="button" id="btnAsamblea" onclick="toggleAsamblea()" class="h-7 px-2 flex items-center justify-center bg-zinc-800 rounded-full text-white/80 active:scale-95 transition-transform shrink-0"><span class="font-bold text-[11px]">ASA</span></button>
                <button type="button" id="btnLimpieza" onclick="toggleCleaning()" class="h-7 px-2 flex items-center justify-center bg-zinc-800 rounded-full text-white/80 active:scale-95 transition-transform shrink-0"><span class="font-bold text-[11px]">LIM</span></button>
            </div>
            <button type="button" onclick="toggleModal('territoryModal')" class="w-8 h-8 flex items-center justify-center bg-zinc-800 rounded-full text-white/80 active:scale-95 transition-transform ml-auto">
                <i data-lucide="map" class="w-4 h-4"></i>
            </button>
        </div>
        
        <div class="flex items-center gap-1.5 bg-zinc-900 p-1 rounded-lg">
            <select id="monthSelector" onchange="handleSelectChange()" class="bg-zinc-800 rounded px-2 py-1 text-xs font-semibold border-none flex-1 outline-none text-white">
                <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
                <option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option>
                <option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option>
                <option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
            </select>
            <select id="weekSelector" onchange="handleSelectChange()" class="bg-zinc-800 rounded px-2 py-1 text-xs font-semibold border-none flex-[0.5] outline-none text-white">
                <option value="1">Sem. 1</option><option value="2">Sem. 2</option><option value="3">Sem. 3</option>
                <option value="4">Sem. 4</option><option value="5">Sem. 5</option>
            </select>
        </div>
    </header>

    <!-- Contenedor Principal -->
    <main class="flex-1 p-2 overflow-y-auto pb-[80px] no-scrollbar" id="scheduleContainer"></main>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto ios-blur border-t border-zinc-900 pb-[env(safe-area-inset-bottom,4px)] flex justify-around items-stretch z-40 h-[58px] box-content">
        <button type="button" onclick="toggleModal('searchModal')" class="flex-1 flex flex-col items-center justify-center text-white/50 group">
            <div class="flex flex-col items-center justify-center transition-transform group-active:scale-95">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span class="text-[9px] font-medium mt-0.5">Buscar</span>
            </div>
        </button>
        <button type="button" onclick="toggleScreenshotMode()" class="flex-1 flex flex-col items-center justify-center text-[#5b00cc] group">
            <div class="flex flex-col items-center justify-center transition-transform group-active:scale-95">
                <i data-lucide="camera" class="w-7 h-7"></i>
                <span class="text-[9px] font-bold mt-0.5">Captura</span>
            </div>
        </button>
        <button type="button" onclick="toggleModal('statsModal')" class="flex-1 flex flex-col items-center justify-center text-white/50 group">
            <div class="flex flex-col items-center justify-center transition-transform group-active:scale-95">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                <span class="text-[9px] font-medium mt-0.5">Ranking</span>
            </div>
        </button>
    </nav>

    <!-- Lista de Direcciones -->
    <datalist id="locationList"></datalist>

    <!-- Modales -->
    <div id="searchModal" class="fixed inset-0 z-[60] hidden bg-black/60 backdrop-blur-md flex items-end justify-center">
        <div class="bg-[#1C1C1E] border border-zinc-800 w-full max-w-md rounded-t-[24px] p-5 pb-10 space-y-3">
            <div class="flex justify-between items-center"><h2 class="text-lg font-bold text-white">Buscar</h2><button onclick="toggleModal('searchModal')" class="p-1.5 bg-zinc-800 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button></div>
            <input type="text" id="searchInput" oninput="doSearch(this.value)" placeholder="Territorio..." class="w-full bg-black/40 text-white rounded-lg px-4 py-2.5 text-sm outline-none border border-zinc-700">
            <div id="searchResults" class="max-h-[50vh] overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <div id="shiftTerritoryModal" class="fixed inset-0 z-[60] hidden bg-black/60 backdrop-blur-md flex items-end justify-center">
        <div class="bg-[#1C1C1E] border border-zinc-800 w-full max-w-md rounded-t-[24px] p-5 pb-10 space-y-3">
            <div class="flex justify-between items-center"><h2 class="text-lg font-bold text-white">Territorios</h2><button onclick="toggleModal('shiftTerritoryModal')" class="p-1.5 bg-zinc-800 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button></div>
            <div class="flex gap-2 mb-2">
                <button id="stBtn_Rev" onclick="toggleShiftTerritory('Rev.')" class="flex-1 py-1.5 text-xs font-bold rounded-lg border border-zinc-700 bg-zinc-800 text-white/70">Rev.</button>
                <button id="stBtn_4.1" onclick="toggleShiftTerritory('4.1')" class="flex-[0.5] py-1.5 text-xs font-bold rounded-lg border border-zinc-700 bg-zinc-800 text-white/70">4.1</button>
            </div>
            <div class="grid-75" id="shiftTerritoryGrid"></div>
            <button onclick="saveShiftTerritories()" class="w-full py-3 mt-4 text-sm font-bold text-white bg-[#5b00cc] rounded-lg">Confirmar</button>
        </div>
    </div>

    <div id="territoryModal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-md flex items-end justify-center">
        <div class="bg-[#1C1C1E] border border-zinc-800 w-full max-w-md rounded-t-[24px] p-5 pb-10 space-y-3">
            <div class="flex justify-between items-center"><h2 class="text-lg font-bold text-white">Mapa</h2><button onclick="toggleModal('territoryModal')" class="p-1.5 bg-zinc-800 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button></div>
            <div class="grid-75" id="territoryGrid"></div>
            <div id="territoryInfoPanel" class="mt-2 p-3 bg-black/40 border border-zinc-700 rounded-lg text-xs hidden"></div>
            <button onclick="clearTerritories()" class="w-full py-2 text-xs font-bold text-red-400">Limpiar Manuales</button>
        </div>
    </div>

    <div id="statsModal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-md flex items-end justify-center">
        <div class="bg-[#1C1C1E] border border-zinc-800 w-full max-w-md rounded-t-[24px] p-5 pb-10 space-y-3">
            <div class="flex justify-between items-center"><h2 class="text-lg font-bold text-white">Ranking</h2><button onclick="toggleModal('statsModal')" class="p-1.5 bg-zinc-800 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button></div>
            <div id="statsContent" class="space-y-1.5"></div>
        </div>
    </div>

    <!-- Alerta iOS -->
    <div id="customAlert" class="fixed inset-0 z-[80] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity opacity-0" id="customAlertBg"></div>
        <div class="bg-[#1C1C1E]/95 border border-zinc-800 w-full max-w-[240px] rounded-[18px] p-5 text-center transform scale-95 opacity-0 transition-all duration-200 z-10" id="customAlertBox">
            <h3 class="text-sm font-semibold text-white mb-1">Aviso</h3>
            <p id="customAlertMsg" class="text-xs text-white/70 mb-4"></p>
            <button onclick="closeCustomAlert()" class="w-full py-2 text-sm font-medium text-[#b800b8] border-t border-zinc-700">OK</button>
        </div>
    </div>

    <script>
        const defaultDrivers = ["Jorge", "Jeremías", "Leonardo", "Darío", "Enzo", "Miguel", "Marcelo", "Pablo F.", "Diego", "Julio", "E. Gauna", "E. García", "Ramón S."];
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const userLocations = ["P.J. Muzio y Cutillo", "Galina y Las Heras", "J. Berreta y J. Marmol", "Saavedra y Roque Gonzalez", "Crucero Gral. Belgrano y J. Ingenieros", "Cutillo y Urquiza", "Galina y 2 de Abril", "P.J. Muzio y Pje. Los Andes", "J. Ingenieros y Juan Evans", "P.J. Muzio y Alem", "13 de Julio y Jorge Montes", "Av. Cristobal Colon y C. Nahuelpan", "Arturo Robert y 13 de Julio", "Saavedra y J. Ingenieros", "Salon del Reino", "C. Nahuelpan y Maria Humphreys", "Maestro Puntanos y Love Parry", "Carrasco y Lezana", "J. A de Padilla y Alderete", "Arturo Robert y C. Nahuelpan", "Conesa y Martin Fierro", "Maria Humphreys y Annie Jones", "C. Nahuelpan y A. Jenkins", "Cutillo y Moreno", "Velero Mimosa y Hann", "Acceso a Base y Nahuelpan", "Galina y Nahuelpan", "Saavedra y Nahuelpan", "Escuela 744", "Alem y Muzio", "Galina y Loyd Jones", "(Laguna Ch.) Calesita", "Italia y Alem", "J.A de Padilla y Jose Hernandez", "J.A de Padilla y Cutillo", "Lezana y 13 de Julio", "Las Heras y L. Novaro", "Alem y Alberdi", "R. Gonzalez y W. Davies", "Nahuelpan y Velero Mimosa", "Flia. Ferrin (Dario)", "Flia. Ferrin (Pablo)", "Flia. Sanchez", "Flia. Velazquez", "Flia. Garcia", "Flia. Echegaray", "Flia. Quirulef", "Flia. Cicchitti", "Flia. Perales", "Flia. Molina", "Maria Ch.", "Carmen S.", "Cleri J.", "Maestros Puntanos y J. Murray Thomas", "Conesa y J. Jones"];

        const weekStructure = [
            { id: 'LUN', label: 'LUN', shifts: [{time: '10.00', id: 'm'}, {time: '17.30', id: 't'}] },
            { id: 'MAR', label: 'MAR', shifts: [{time: '10.00', id: 'm'}, {time: '17.30', id: 't'}] },
            { id: 'MIE', label: 'MIE', shifts: [{time: '10.00', id: 'm'}, {time: '17.30', id: 't'}] },
            { id: 'JUE', label: 'JUE', shifts: [{time: '10.00', id: 'm'}, {time: '17.30', id: 't'}] },
            { id: 'VIE', label: 'VIE', shifts: [{time: '10.00', id: 'm'}, {time: '17.30', id: 't'}] },
            { id: 'SAB', label: 'SAB', shifts: [{time: '10.00', id: 'g1', prefix: 'G1'}, {time: '', id: 'g2', prefix: 'G2'}, {time: '', id: 'g3', prefix: 'G3'}, {time: '', id: 'g4', prefix: 'G4'}]},
            { id: 'DOM', label: 'DOM', shifts: [{time: '10.00', id: 'm'}] }
        ];

        let state = { currentMonth: 0, currentWeek: 1, territories: new Array(75).fill(false), assignments: {}, isCampana: false, drivers: [...defaultDrivers] };
        let editingDay, editingShift, tempTerritories = [], touchstartX, touchendX, currentAnim = 'fade', holdTimer;

        const savedState = localStorage.getItem('app_horario_2026_v2');
        if (savedState) state = JSON.parse(savedState);

        function init() {
            lucide.createIcons();
            document.getElementById('monthSelector').value = state.currentMonth;
            document.getElementById('weekSelector').value = state.currentWeek;
            const dl = document.getElementById('locationList');
            dl.innerHTML = '';
            userLocations.forEach(loc => { const opt = document.createElement('option'); opt.value = loc; dl.appendChild(opt); });
            setupSwipe();
            renderSchedule();
            renderTerritoryGrid();
            renderShiftTerritoryGrid();
        }

        function getDatesForMonthWeek(month, weekNum) {
            let firstDay = new Date(2026, month, 1), dayOfWeek = firstDay.getDay(), daysToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
            let firstMonday = new Date(2026, month, 1 + daysToMonday), targetMonday = new Date(firstMonday.getTime() + (weekNum - 1) * 7 * 24 * 60 * 60 * 1000);
            let dates = [];
            for(let i=0; i<7; i++) { let d = new Date(targetMonday.getTime() + i * 24 * 60 * 60 * 1000); dates.push({ day: d.getDate() }); }
            return dates;
        }

        function setupSwipe() {
            const container = document.getElementById('scheduleContainer');
            container.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive: true});
            container.addEventListener('touchend', e => { 
                touchendX = e.changedTouches[0].screenX;
                if (touchendX < touchstartX - 60) nextWeek();
                if (touchendX > touchstartX + 60) prevWeek();
            }, {passive: true});
        }

        function nextWeek() { currentAnim = 'right'; if (state.currentWeek < 5) state.currentWeek++; else if (state.currentMonth < 11) { state.currentMonth++; state.currentWeek = 1; } updateSelectorsAndRender(); }
        function prevWeek() { currentAnim = 'left'; if (state.currentWeek > 1) state.currentWeek--; else if (state.currentMonth > 0) { state.currentMonth--; state.currentWeek = 5; } updateSelectorsAndRender(); }
        function updateSelectorsAndRender() { document.getElementById('monthSelector').value = state.currentMonth; document.getElementById('weekSelector').value = state.currentWeek; changeDate(); }
        function handleSelectChange() { currentAnim = 'fade'; changeDate(); }
        function changeDate() { state.currentMonth = parseInt(document.getElementById('monthSelector').value); state.currentWeek = parseInt(document.getElementById('weekSelector').value); renderSchedule(); saveState(); }
        function getWeekKey() { return `${state.currentMonth}-${state.currentWeek}`; }

        function getSmartDriverList() {
            const driverLastSeen = {}; state.drivers.forEach(d => driverLastSeen[d] = 0);
            Object.keys(state.assignments).forEach(weekKey => {
                const [m, w] = weekKey.split('-').map(Number), score = m * 100 + w * 10;
                Object.values(state.assignments[weekKey]).forEach(dayData => {
                    Object.values(dayData).forEach(shiftData => {
                        if (shiftData.driver && state.drivers.includes(shiftData.driver)) {
                            if (!driverLastSeen[shiftData.driver] || driverLastSeen[shiftData.driver] < score) driverLastSeen[shiftData.driver] = score;
                        }
                    });
                });
            });
            return [...state.drivers].sort((a, b) => driverLastSeen[a] - driverLastSeen[b]);
        }

        function handleHoldStart(e, day, shift) {
            const el = e.currentTarget; el.classList.add('holding');
            holdTimer = setTimeout(() => {
                const wk = getWeekKey();
                const currentMode = state.assignments[wk]?.[day]?.[shift]?.manualMode || false;
                toggleManualMode(day, shift, !currentMode);
                el.classList.remove('holding');
            }, 2000);
        }
        function handleHoldEnd(e) { clearTimeout(holdTimer); e.currentTarget.classList.remove('holding'); }

        function renderSchedule() {
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';
            const weekKey = getWeekKey(), weekData = state.assignments[weekKey] || {}, sabData = weekData['SAB'] || {};
            const dates = getDatesForMonthWeek(state.currentMonth, state.currentWeek), smartDrivers = getSmartDriverList();

            weekStructure.forEach((dayDef, index) => {
                if (dayDef.id === 'LUN' && !state.isCampana) return;
                const dateInfo = dates[index], dayData = weekData[dayDef.id] || {};
                const isViolet = ['MAR', 'JUE', 'SAB'].includes(dayDef.id);
                const theme = { card: isViolet ? 'bg-[#4900a3]' : 'bg-[#930093]', time: 'text-white', input: 'bg-black/15 text-white', filledSelect: 'bg-black/30 text-white font-bold', emptySelect: 'bg-black/15 text-white/70' };

                const getShiftHtml = (shift, defaultSpot = '', compact = false) => {
                    const sData = dayData[shift.id] || {}, spotValue = sData.spot !== undefined ? sData.spot : defaultSpot, isManual = sData.manualMode === true;
                    let defDriver = '';
                    if (sabData.isVisita) {
                        if (dayDef.id === 'SAB') defDriver = shift.id === 't' ? 'Salón del Reino (Reunión)' : 'Sup. de Circ.';
                        else defDriver = dayDef.id === 'MAR' ? '' : 'Sup. de Circ.';
                    }
                    const currentDriver = sData.driver !== undefined ? sData.driver : defDriver, tArray = sData.territories || [], displayTerr = tArray.length > 0 ? tArray.join(',') : '-';
                    const holdEvents = `onpointerdown="handleHoldStart(event, '${dayDef.id}', '${shift.id}')" onpointerup="handleHoldEnd(event)" onpointerleave="handleHoldEnd(event)"`;

                    let addrEl = isManual 
                        ? `<input type="text" onchange="updateData('${dayDef.id}', '${shift.id}', 'spot', this.value)" value="${spotValue}" placeholder="..." class="w-full h-[24px] ${theme.input} rounded px-1.5 text-[10px] outline-none border-none">`
                        : `<select onchange="updateData('${dayDef.id}', '${shift.id}', 'spot', this.value)" class="w-full h-[24px] ${theme.input} rounded px-1 text-[10px] outline-none border-none select-no-arrow">
                            <option value="">-</option>${spotValue && !userLocations.includes(spotValue) ? `<option value="${spotValue}" selected>${spotValue}</option>` : ''}
                            ${userLocations.map(loc => `<option value="${loc}" ${spotValue === loc ? 'selected' : ''}>${loc}</option>`).join('')}
                           </select>`;

                    return `<div class="flex items-center gap-1 w-full mb-1">
                        ${!compact ? `<input type="text" value="${sData.time || shift.time}" onchange="updateData('${dayDef.id}', '${shift.id}', 'time', this.value)" class="w-[32px] text-right text-[11px] font-bold ${theme.time} bg-transparent border-none rounded py-0.5 outline-none">` : ''}
                        ${shift.prefix ? `<div class="w-[18px] text-center text-[11px] font-extrabold text-white/80">${shift.prefix}</div>` : `<div class="w-[2px]"></div>`}
                        <div class="relative flex-1 min-w-0" ${holdEvents}>${addrEl}</div>
                        <button onclick="openShiftTerritoryModal('${dayDef.id}', '${shift.id}')" class="shrink-0 h-[24px] min-w-[28px] rounded px-1 text-[10px] font-bold text-center ${tArray.length > 0 ? theme.filledSelect : theme.emptySelect}">${displayTerr}</button>
                        <select onchange="updateData('${dayDef.id}', '${shift.id}', 'driver', this.value); renderSchedule();" class="select-no-arrow w-[60px] h-[24px] rounded text-[9px] font-semibold outline-none ${currentDriver ? theme.filledSelect : theme.emptySelect}">
                            <option value="">-</option><option value="Sup. de Circ." ${currentDriver === 'Sup. de Circ.' ? 'selected' : ''}>Sup. de Circ.</option>
                            ${smartDrivers.map(d => `<option value="${d}" ${currentDriver === d ? 'selected' : ''}>${d}</option>`).join('')}
                        </select></div>`;
                };

                let content = '';
                if (dayDef.id === 'SAB' && (dayData.isCleaning || dayData.isAsamblea)) {
                    const label = dayData.isCleaning ? 'Limpieza General' : 'Asamblea';
                    content = `<div class="flex items-center w-full py-2 bg-black/30 rounded-lg mt-1 px-1.5 shadow-sm"><div class="flex-1 text-center font-bold text-[12px] text-white uppercase tracking-wider">${label}</div></div>`;
                } else if (dayDef.id === 'SAB' && dayData.isVisita) {
                    content = [{time: '09.30', id: 'm'}, {time: '19.30', id: 't'}].map(s => getShiftHtml(s, s.id === 't' ? 'Salón del Reino (Reunión)' : '')).join('');
                } else if (dayDef.id === 'SAB') {
                    const rows = dayDef.shifts.map(s => getShiftHtml(s, '', true)).join('');
                    content = `<div class="flex w-full items-stretch"><div class="flex flex-col justify-center shrink-0 border-r border-white/10 pr-1.5 mr-1"><input type="text" value="${dayData['g1']?.time || '10.00'}" onchange="updateData('SAB', 'g1', 'time', this.value)" class="w-[34px] text-center text-[11px] font-black ${theme.time} bg-transparent border-none outline-none"></div><div class="flex-1 flex flex-col justify-center">${rows}</div></div>`;
                } else {
                    let curShifts = [...dayDef.shifts];
                    if (sabData.isVisita) {
                        if (dayDef.id === 'MAR') curShifts = curShifts.map(s => s.id === 't' ? { ...s, time: '20.00' } : s);
                        if (dayDef.id === 'MIE' || dayDef.id === 'VIE') curShifts.push({time: '20.00', id: 'n'});
                    }
                    content = curShifts.map(s => {
                        let spot = '';
                        if (sabData.isVisita) {
                            if (dayDef.id === 'MAR' && s.id === 't') spot = 'Reunión';
                            else if (dayDef.id === 'MIE' && s.id === 'n') spot = 'Reunión con PR y AUX (SR)';
                            else if (dayDef.id === 'VIE' && s.id === 'n') spot = 'Reunión con Anc y SM (SR)';
                        }
                        return getShiftHtml(s, spot);
                    }).join('');
                }

                const card = document.createElement('div');
                card.className = `day-card ${theme.card} rounded-xl shadow-lg flex overflow-hidden border border-black/10 mb-1.5`;
                card.innerHTML = `<div class="w-8 shrink-0 flex flex-col items-center justify-center border-r border-white/5 py-1"><span class="text-[8px] font-bold text-white/60">${dayDef.label}</span><span class="text-[16px] font-black text-white">${dateInfo.day}</span></div><div class="flex-1 py-1 px-1 flex flex-col justify-center overflow-hidden">${content}</div>`;
                container.appendChild(card);
            });
            
            lucide.createIcons();
            container.classList.remove('animate-enter-right', 'animate-enter-left', 'animate-fade');
            void container.offsetWidth; 
            if (currentAnim === 'right') container.classList.add('animate-enter-right');
            else if (currentAnim === 'left') container.classList.add('animate-enter-left');
            else container.classList.add('animate-fade');
            currentAnim = 'fade';
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            if (m.classList.contains('hidden')) {
                if (id === 'statsModal') {
                    const counts = {}; Object.values(state.assignments).forEach(w => Object.values(w).forEach(d => Object.values(d).forEach(s => { (s.territories || []).forEach(t => { if (t && t !== "Rev." && t !== "-") counts[t] = (counts[t] || 0) + 1; }); })));
                    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,5);
                    document.getElementById('statsContent').innerHTML = sorted.length ? sorted.map(([n,c]) => `<div class="flex items-center justify-between p-2 bg-zinc-800 rounded-lg border border-zinc-700"><div class="flex items-center gap-3"><span class="w-6 h-6 rounded-full bg-[#5b00cc]/30 text-[#cda4ff] flex items-center justify-center font-bold text-[10px]">${n}</span><span class="text-[11px] text-white/90">Territorio ${n}</span></div><span class="text-[9px] font-bold text-white/60 bg-zinc-700 px-2 py-0.5 rounded">${c} veces</span></div>`).join('') : '<div class="text-center py-4 text-white/40 text-xs">Sin datos</div>';
                }
                m.classList.remove('hidden');
            } else m.classList.add('hidden');
        }

        function doSearch(v) {
            const d = document.getElementById('searchResults'); if (!v) { d.innerHTML = ''; return; }
            const history = [];
            for (const wk in state.assignments) for (const dy in state.assignments[wk]) for (const sf in state.assignments[wk][dy]) {
                if ((state.assignments[wk][dy][sf].territories || []).includes(v)) {
                    const [m, w] = wk.split('-').map(Number);
                    history.push({ m, w, driver: state.assignments[wk][dy][sf].driver });
                }
            }
            d.innerHTML = history.reverse().map(h => `<div class="bg-zinc-800 p-2 rounded-lg border border-zinc-700 mb-1 flex justify-between items-center"><div class="text-[10px] text-white/70">Sem. ${h.w} - ${monthNames[h.m]}</div><div class="text-[10px] font-bold text-white">${h.driver || '-'}</div></div>`).join('');
        }

        function openShiftTerritoryModal(day, shift) { editingDay = day; editingShift = shift; const sData = state.assignments[getWeekKey()]?.[day]?.[shift] || {}; tempTerritories = sData.territories ? [...sData.territories] : []; renderShiftTerritoryGrid(); toggleModal('shiftTerritoryModal'); }
        function toggleShiftTerritory(val) { const i = tempTerritories.indexOf(val); if (i > -1) tempTerritories.splice(i, 1); else if (tempTerritories.length < 4) tempTerritories.push(val); renderShiftTerritoryGrid(); }
        function renderShiftTerritoryGrid() {
            const g = document.getElementById('shiftTerritoryGrid'); g.innerHTML = '';
            for (let i = 1; i <= 75; i++) {
                const btn = document.createElement('button'); const sel = tempTerritories.includes(i.toString());
                btn.className = `h-8 text-[11px] font-bold rounded flex items-center justify-center transition-all ${sel ? 'bg-[#5b00cc] text-white' : 'bg-zinc-800 text-white/70 border border-zinc-700'}`;
                btn.textContent = i; btn.onclick = () => toggleShiftTerritory(i.toString()); g.appendChild(btn);
            }
        }
        function saveShiftTerritories() { updateData(editingDay, editingShift, 'territories', [...tempTerritories]); toggleModal('shiftTerritoryModal'); renderSchedule(); renderTerritoryGrid(); }
        
        function renderTerritoryGrid() {
            const grid = document.getElementById('territoryGrid'); grid.innerHTML = ''; const monthlyAssigned = new Set();
            Object.keys(state.assignments).forEach(key => { 
                if (key.startsWith(`${state.currentMonth}-`)) {
                    Object.values(state.assignments[key]).forEach(dayData => {
                        Object.values(dayData).forEach(shiftData => { 
                            if (shiftData && shiftData.territories) shiftData.territories.forEach(t => monthlyAssigned.add(t)); 
                        });
                    });
                }
            });
            for (let i = 1; i <= 75; i++) {
                const btn = document.createElement('button'); const tStr = i.toString(), isAuto = monthlyAssigned.has(tStr), isMan = state.territories[i-1];
                btn.className = `h-7 text-[10px] font-bold rounded flex items-center justify-center ${isAuto ? 'bg-emerald-600 text-white' : (isMan ? 'bg-[#b800b8] text-white' : 'bg-zinc-800 text-white/50 border border-zinc-700')}`;
                btn.textContent = i; btn.onclick = () => { if(!isAuto) { state.territories[i-1] = !state.territories[i-1]; saveState(); renderTerritoryGrid(); } showTerritoryInfo(tStr, isAuto || state.territories[i-1]); }; grid.appendChild(btn);
            }
        }

        function toggleCampana() { state.isCampana = !state.isCampana; saveState(); renderSchedule(); }
        function toggleVisita() { const wk = getWeekKey(); if (!state.assignments[wk]) state.assignments[wk] = {}; if (!state.assignments[wk]['SAB']) state.assignments[wk]['SAB'] = {}; state.assignments[wk]['SAB'].isVisita = !state.assignments[wk]['SAB'].isVisita; if (state.assignments[wk]['SAB'].isVisita) { state.assignments[wk]['SAB'].isAsamblea = false; state.assignments[wk]['SAB'].isCleaning = false; } saveState(); renderSchedule(); }
        function toggleAsamblea() { const wk = getWeekKey(); if (!state.assignments[wk]) state.assignments[wk] = {}; if (!state.assignments[wk]['SAB']) state.assignments[wk]['SAB'] = {}; state.assignments[wk]['SAB'].isAsamblea = !state.assignments[wk]['SAB'].isAsamblea; if (state.assignments[wk]['SAB'].isAsamblea) { state.assignments[wk]['SAB'].isCleaning = false; state.assignments[wk]['SAB'].isVisita = false; } saveState(); renderSchedule(); }
        function toggleCleaning() { const wk = getWeekKey(); if (!state.assignments[wk]) state.assignments[wk] = {}; if (!state.assignments[wk]['SAB']) state.assignments[wk]['SAB'] = {}; state.assignments[wk]['SAB'].isCleaning = !state.assignments[wk]['SAB'].isCleaning; if (state.assignments[wk]['SAB'].isCleaning) { state.assignments[wk]['SAB'].isAsamblea = false; state.assignments[wk]['SAB'].isVisita = false; } saveState(); renderSchedule(); }
        function toggleManualMode(d, s, m) { updateData(d, s, 'manualMode', m); renderSchedule(); }
        function updateData(d, s, f, v) { const wk = getWeekKey(); if (!state.assignments[wk]) state.assignments[wk] = {}; if (!state.assignments[wk][d]) state.assignments[wk][d] = {}; if (!state.assignments[wk][d][s]) state.assignments[wk][d][s] = {}; state.assignments[wk][d][s][f] = v; saveState(); }
        function syncCloudPlaceholder() { showCustomAlert("Sincronización en la nube próximamente."); }
        function toggleScreenshotMode() { document.getElementById('appBody').classList.add('screenshot-mode'); }
        function exitScreenshotMode() { document.getElementById('appBody').classList.remove('screenshot-mode'); }
        function saveState() { localStorage.setItem('app_horario_2026_v2', JSON.stringify(state)); }
        function showCustomAlert(m) { document.getElementById('customAlertMsg').textContent = m; document.getElementById('customAlert').classList.remove('hidden'); document.getElementById('customAlert').classList.add('flex'); void document.getElementById('customAlertBox').offsetWidth; document.getElementById('customAlertBg').classList.remove('opacity-0'); document.getElementById('customAlertBox').classList.remove('scale-95'); document.getElementById('customAlertBox').classList.add('opacity-100', 'scale-100'); }
        function closeCustomAlert() { document.getElementById('customAlertBg').classList.add('opacity-0'); document.getElementById('customAlertBox').classList.remove('opacity-100', 'scale-100'); setTimeout(() => { document.getElementById('customAlert').classList.add('hidden'); document.getElementById('customAlert').classList.remove('flex'); }, 200); }

        window.onload = init;
    </script>
</body>
</html>
